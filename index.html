<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lightning Out 2.0 POC</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      line-height: 1.4;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
      font-weight: 600;
    }
    input, select, button {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin: 12px 0 16px;
      flex-wrap: wrap;
    }
    .actions button {
      width: auto;
      min-width: 160px;
      cursor: pointer;
    }
    #status {
      margin: 12px 0;
      padding: 10px 12px;
      border-radius: 6px;
      background: #f5f5f5;
      white-space: pre-wrap;
    }
    #status.error {
      background: #fdecea;
    }
    #status.ok {
      background: #edf7ed;
    }
    #host {
      min-height: 120px;
      margin: 12px 0 16px;
    }
    #debug {
      background: #111;
      color: #eee;
      padding: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
      overflow: auto;
      max-height: 420px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }
    .hint {
      color: #555;
      margin-bottom: 12px;
    }
    code {
      background: #f3f3f3;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h2>Lightning Out 2.0 POC</h2>
  <p class="hint">
    This page uses the documented org-domain LO2 flow.
    Whitelist this origin in Salesforce:
    <code id="originText"></code>
  </p>

  <div class="controls">
    <div>
      <label for="envSelect">Environment</label>
      <select id="envSelect">
        <option value="uat">UAT</option>
        <option value="prod">Production</option>
      </select>
    </div>
    <div>
      <label for="railwayUrl">Railway API base URL</label>
      <input id="railwayUrl" value="https://sc-auth-amart-production.up.railway.app" />
    </div>
  </div>

  <div class="actions">
    <button id="runBtn" type="button">Run POC</button>
    <button id="reloadBtn" type="button">Reload With Selected Env</button>
  </div>

  <div id="status">Ready. Click "Run POC" to start.</div>
  <div id="host"></div>
  <pre id="debug"></pre>

  <script>
    (function () {
      const CONFIG = {
        uat: {
          scriptSrc: "https://warranty2amartfurniture--amartuat.sandbox.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js",
          appId: "1Us9n00000000mPCAQ",
          componentName: "c-pos-actions-host-lo2"
        },
        prod: {
          scriptSrc: "https://warranty2amartfurniture.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js",
          appId: "1UsW200000001VZKAY",
          componentName: "c-pos-actions-host-lo2"
        }
      };

      const statusEl = document.getElementById("status");
      const debugEl = document.getElementById("debug");
      const hostEl = document.getElementById("host");
      const envSelect = document.getElementById("envSelect");
      const railwayUrlInput = document.getElementById("railwayUrl");
      const runBtn = document.getElementById("runBtn");
      const reloadBtn = document.getElementById("reloadBtn");
      const originText = document.getElementById("originText");

      const queryEnv = (new URLSearchParams(window.location.search).get("env") || "prod").toLowerCase();
      envSelect.value = CONFIG[queryEnv] ? queryEnv : "prod";
      originText.textContent = window.location.origin;

      let loadedScriptSrc = null;
      let listenersRegistered = false;

      function setStatus(message, kind) {
        statusEl.textContent = message;
        statusEl.className = kind || "";
      }

      function log(title, value) {
        const line = `[${new Date().toISOString()}] ${title}${value === undefined ? "" : `: ${typeof value === "string" ? value : JSON.stringify(value, null, 2)}`}`;
        debugEl.textContent += (debugEl.textContent ? "\n" : "") + line;
        console.log("[LO2 POC]", title, value);
      }

      function clearDebug() {
        debugEl.textContent = "";
      }

      function maskUrl(url) {
        try {
          const u = new URL(url);
          if (u.searchParams.has("otp")) {
            const otp = u.searchParams.get("otp") || "";
            u.searchParams.set("otp", otp.slice(0, 12) + "...");
          }
          return u.toString();
        } catch {
          return url;
        }
      }

      function registerGlobalListeners() {
        if (listenersRegistered) return;
        listenersRegistered = true;

        window.addEventListener("message", (event) => {
          log("postMessage", {
            origin: event.origin,
            data: typeof event.data === "string" ? event.data.slice(0, 500) : event.data
          });
        });

        window.addEventListener("error", (event) => {
          log("window.error", {
            message: event.message,
            filename: event.filename,
            lineno: event.lineno,
            colno: event.colno
          });
        });

        window.addEventListener("unhandledrejection", (event) => {
          log("window.unhandledrejection", String(event.reason));
        });
      }

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const existing = document.querySelector(`script[data-lo2-src="${src}"]`);
          if (existing) {
            if (window.customElements && window.customElements.get("lightning-out-application")) {
              resolve();
              return;
            }
            existing.addEventListener("load", () => resolve(), { once: true });
            existing.addEventListener("error", () => reject(new Error("Failed to load Lightning Out script.")), { once: true });
            return;
          }

          const script = document.createElement("script");
          script.src = src;
          script.async = true;
          script.dataset.lo2Src = src;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error(`Failed to load Lightning Out script: ${src}`));
          document.head.appendChild(script);
        });
      }

      async function fetchPocFrontdoor(env, appId) {
        const base = railwayUrlInput.value.trim().replace(/\/+$/, "");
        const url = `${base}/api/lo2/poc-frontdoor`;
        const body = { env, appId };

        log("window.location.origin", window.location.origin);
        log("Whitelist this origin in Salesforce", window.location.origin);
        log("Railway endpoint", url);
        log("Railway request body", body);

        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        const text = await response.text();
        log("Railway raw response status", response.status);
        log("Railway raw response body", text);

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error(`Railway returned non-JSON response (${response.status}).`);
        }

        if (!response.ok) {
          throw new Error(data.error || `Railway request failed with status ${response.status}.`);
        }

        if (!data.frontdoorUrl) {
          throw new Error("Railway response did not include frontdoorUrl.");
        }

        log("frontdoorUrl", maskUrl(data.frontdoorUrl));
        return data.frontdoorUrl;
      }

      function createLo2Elements(config, frontdoorUrl) {
        const lo2App = document.createElement("lightning-out-application");
        lo2App.setAttribute("app-id", config.appId);
        lo2App.setAttribute("components", config.componentName);
        lo2App.setAttribute("frontdoor-url", frontdoorUrl);

        const componentEl = document.createElement(config.componentName);

        hostEl.replaceChildren(lo2App, componentEl);
        return { lo2App, componentEl };
      }

      async function run() {
        clearDebug();
        hostEl.replaceChildren();

        const env = envSelect.value;
        const config = CONFIG[env];

        if (!config) {
          setStatus("Invalid environment selected.", "error");
          return;
        }

        if (loadedScriptSrc && loadedScriptSrc !== config.scriptSrc) {
          setStatus("Environment changed after LO2 script load. Use reload to switch environments safely.", "error");
          log("Unsafe env switch blocked", {
            loadedScriptSrc,
            requestedScriptSrc: config.scriptSrc
          });
          return;
        }

        try {
          registerGlobalListeners();

          setStatus("Loading Lightning Out script...");
          log("Selected env", env);
          log("Selected config", config);

          await loadScript(config.scriptSrc);
          loadedScriptSrc = config.scriptSrc;

          log("Script loaded", config.scriptSrc);
          setStatus("Waiting for lightning-out-application custom element...");

          await customElements.whenDefined("lightning-out-application");
          log("Custom element defined", "lightning-out-application");

          setStatus("Fetching POC frontdoor URL...");
          const frontdoorUrl = await fetchPocFrontdoor(env, config.appId);

          setStatus("Injecting Lightning Out application...");
          const { lo2App, componentEl } = createLo2Elements(config, frontdoorUrl);

          log("Injected appId", config.appId);
          log("Injected componentName", config.componentName);
          log("Component element created", !!componentEl);

          lo2App.addEventListener("applicationready", () => {
            log("Event", "applicationready");
            setStatus("Lightning Out application is ready.", "ok");
          });

          lo2App.addEventListener("applicationerror", (event) => {
            const message = event?.detail?.message || "Unknown Lightning Out application error.";
            log("Event applicationerror", {
              message,
              detail: event?.detail || null
            });
            setStatus(`Lightning Out application error: ${message}`, "error");
          });

          setTimeout(() => {
            const resources = performance.getEntriesByType("resource")
              .filter((r) =>
                String(r.name).includes("salesforce.com") ||
                String(r.name).includes("my.site.com") ||
                String(r.name).includes("lightningout")
              )
              .map((r) => ({
                name: r.name,
                initiatorType: r.initiatorType,
                duration: Math.round(r.duration)
              }));

            log("Related resource timings", resources);
          }, 3000);

          setStatus("Lightning Out injected. Waiting for events...");
        } catch (error) {
          log("Run failed", error.message || String(error));
          setStatus(`Error: ${error.message || error}`, "error");
        }
      }

      envSelect.addEventListener("change", () => {
        const selectedEnv = envSelect.value;
        const selectedConfig = CONFIG[selectedEnv];
        if (loadedScriptSrc && selectedConfig && loadedScriptSrc !== selectedConfig.scriptSrc) {
          setStatus("Environment changed. Click 'Reload With Selected Env' before running again.", "error");
        }
      });

      runBtn.addEventListener("click", () => {
        setStatus("Starting POC...");
        run();
      });

      reloadBtn.addEventListener("click", () => {
        const url = new URL(window.location.href);
        url.searchParams.set("env", envSelect.value);
        window.location.href = url.toString();
      });
    })();
  </script>
</body>
</html>
